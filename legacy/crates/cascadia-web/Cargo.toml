[package]
name = "cascadia-web"
version = "0.1.0"
edition = "2021"

[features]
# Mirror the CLI's NNUE-feature gates so the web server can be built to load the
# matching champion weights file. Build with the same combination used to train
# the weights you intend to load.
mid-features = ["cascadia-ai/mid-features"]
v4-opp = ["cascadia-ai/v4-opp"]
v5-feat = ["cascadia-ai/v5-feat"]
v6-peak = ["cascadia-ai/v6-peak"]

[dependencies]
cascadia-core = { path = "../cascadia-core" }
cascadia-ai = { path = "../cascadia-ai" }
axum = "0.8"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"
tower-http = { version = "0.6", features = ["cors"] }
