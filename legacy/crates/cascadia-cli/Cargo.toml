[package]
name = "cascadia-cli"
version = "0.1.0"
edition = "2021"

[features]
large-net = ["cascadia-ai/large-net"]
small-net = ["cascadia-ai/small-net"]
legacy-features = ["cascadia-ai/legacy-features"]
mid-features = ["cascadia-ai/mid-features"]
v4-opp = ["cascadia-ai/v4-opp"]
v5-feat = ["cascadia-ai/v5-feat"]
czero-feat = ["cascadia-ai/czero-feat"]
v6-peak = ["cascadia-ai/v6-peak"]
cards-alt = ["cascadia-ai/cards-alt"]
cards-alt-v2 = ["cascadia-ai/cards-alt-v2"]
oppmarket-feat = ["cascadia-ai/oppmarket-feat"]
az-v2 = ["cascadia-ai/az-v2"]
# Phase 0.8.B SGEMM backend selection — surfaced through the cli for binary
# builds. Pick at most one; both work, accelerate wins if both selected.
accelerate = ["cascadia-ai/accelerate"]
matmul-portable = ["cascadia-ai/matmul-portable"]

[dependencies]
cascadia-core = { path = "../cascadia-core" }
cascadia-ai = { path = "../cascadia-ai" }
crossterm = "0.28"
clap = { version = "4", features = ["derive"] }
rand = "0.8"
rayon = "1.10"
